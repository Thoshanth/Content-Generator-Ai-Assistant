<!DOCTYPE html>
<html>
<head>
    <title>API Test</title>
</head>
<body>
    <h1>Chat Sessions API Test</h1>
    <button onclick="testGetSessions()">Test Get Sessions</button>
    <button onclick="testAuth()">Test Auth</button>
    <pre id="output"></pre>

    <script>
        const API_BASE_URL = 'http://localhost:8080/api';
        const output = document.getElementById('output');

        async function testAuth() {
            const token = localStorage.getItem('accessToken');
            output.textContent = `Token: ${token ? 'Found' : 'Not found'}\n`;
            
            if (token) {
                output.textContent += `Token value: ${token.substring(0, 50)}...\n`;
            }
        }

        async function testGetSessions() {
            try {
                const token = localStorage.getItem('accessToken');
                
                if (!token) {
                    output.textContent = 'Error: No access token found. Please login first.';
                    return;
                }

                output.textContent = 'Fetching sessions...\n';
                
                const response = await fetch(`${API_BASE_URL}/chat/sessions`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                output.textContent += `Status: ${response.status} ${response.statusText}\n\n`;

                const data = await response.json();
                output.textContent += `Response:\n${JSON.stringify(data, null, 2)}`;

            } catch (error) {
                output.textContent = `Error: ${error.message}\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
