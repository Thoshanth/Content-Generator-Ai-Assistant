<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend-Backend Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        button { padding: 10px 20px; margin: 5px; }
        textarea { width: 100%; height: 100px; margin: 10px 0; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>Frontend-Backend Connection Test</h1>
    
    <div class="test">
        <h3>Step 1: Login</h3>
        <button onclick="testLogin()">Test Login</button>
        <div id="loginResult"></div>
    </div>
    
    <div class="test">
        <h3>Step 2: Send Chat Message</h3>
        <textarea id="chatPrompt" placeholder="Enter your message here...">write email to hr Anjali Nair that tomorrow at 1-2pm i wont be available because of pbl review in my class</textarea>
        <br>
        <button onclick="testChat()">Send Message</button>
        <div id="chatResult"></div>
    </div>
    
    <div id="result"></div>

    <script>
        let accessToken = null;
        
        async function testLogin() {
            const loginResult = document.getElementById('loginResult');
            loginResult.innerHTML = 'Testing login...';
            
            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'password123'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    accessToken = data.accessToken;
                    loginResult.innerHTML = `<div class="success">✅ Login successful! Token received.</div>`;
                    console.log('Login response:', data);
                } else {
                    const error = await response.text();
                    loginResult.innerHTML = `<div class="error">❌ Login failed: ${response.status} - ${error}</div>`;
                }
            } catch (error) {
                loginResult.innerHTML = `<div class="error">❌ Login error: ${error.message}</div>`;
            }
        }
        
        async function testChat() {
            const chatResult = document.getElementById('chatResult');
            const prompt = document.getElementById('chatPrompt').value;
            
            if (!accessToken) {
                chatResult.innerHTML = '<div class="error">❌ Please login first!</div>';
                return;
            }
            
            if (!prompt.trim()) {
                chatResult.innerHTML = '<div class="error">❌ Please enter a message!</div>';
                return;
            }
            
            chatResult.innerHTML = 'Sending message...';
            
            try {
                const response = await fetch('http://localhost:8080/api/chat/message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                    body: JSON.stringify({
                        prompt: prompt,
                        contentType: 'email'
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    chatResult.innerHTML = `
                        <div class="success">
                            ✅ Message sent successfully!<br>
                            <strong>Session ID:</strong> ${data.sessionId}<br>
                            <strong>Model:</strong> ${data.modelUsed}<br>
                            <strong>Content Preview:</strong> ${data.content.substring(0, 200)}...
                        </div>
                    `;
                    console.log('Chat response:', data);
                } else {
                    const error = await response.text();
                    chatResult.innerHTML = `<div class="error">❌ Chat failed: ${response.status} - ${error}</div>`;
                }
            } catch (error) {
                chatResult.innerHTML = `<div class="error">❌ Chat error: ${error.message}</div>`;
            }
        }
        
        // Auto-test login on page load
        window.onload = function() {
            testLogin();
        };
    </script>
</body>
</html>
