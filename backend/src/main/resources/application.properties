# Application Configuration
spring.application.name=ai-content-generator
server.port=8080

# Firebase Configuration
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:./firebase-credentials.json}
firebase.database.url=${FIREBASE_DATABASE_URL:https://your-project-id.firebaseio.com}

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production}
jwt.expiration=900000
jwt.refresh.expiration=604800000

# Python AI Service Configuration
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Rate Limiting Configuration
rate.limit.daily=1000
rate.limit.enabled=false

# Image Generation Configuration
image.daily.limit=${IMAGE_DAILY_LIMIT:5}
image.storage.path=${IMAGE_STORAGE_PATH:../ai-service/generated_images}

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Logging
logging.level.com.contentgen=DEBUG
logging.level.org.springframework.security=DEBUG

# Spring Boot DevTools (optional)
spring.devtools.restart.enabled=true
